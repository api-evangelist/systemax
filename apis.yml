aid: systemax
name: Systemax
description: >-
  Systemax Inc. (now operating as Global Industrial Company, NYSE: SYX) is a
  B2B direct marketer of industrial, maintenance, repair, and operations (MRO)
  products in North America. The company sells storage and shelving, material
  handling equipment, safety products, tools, HVAC, office supplies, and
  thousands of other industrial products to businesses, educational organizations,
  and government entities through its Global Industrial brand. Systemax was
  founded in 1949 and rebranded its primary segment to Global Industrial in 2021.
